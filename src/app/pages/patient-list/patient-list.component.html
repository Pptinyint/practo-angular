<div class="container-fluid py-4">
    <div class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <h4 class="mb-0 text-primary fw-bold">Hospital Management</h4>
            <button class="btn btn-primary shadow-sm" type="button" data-bs-toggle="modal" data-bs-target="#hospitalModal">
                <i class="fas fa-plus me-2"></i>Add Hospital
            </button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-list me-2"></i>Registered Hospitals</h5>
                    <div class="input-group input-group-sm w-25 d-none d-md-flex">
                        <input type="text" class="form-control" placeholder="Search hospital...">
                        <span class="input-group-text bg-light"><i class="fas fa-search"></i></span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">ID</th>
                                    <th>Hospital Details</th>
                                    <th>City</th>
                                    <th>Contact</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="ps-4 fw-bold text-muted">101</td>
                                    <td>
                                        <div class="fw-bold">Max Healthcare</div>
                                        <small class="text-muted">maxhospital.com</small>
                                    </td>
                                    <td>Delhi</td>
                                    <td>9876543210</td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-light text-primary me-1" title="Edit"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light text-danger" title="Delete"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3">
                    <div class="text-muted small">Showing <b>1-10</b> of <b>50</b> entries</div>
                    <nav aria-label="Page navigation">
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item"><a class="page-link" href="#">Next</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="hospitalModal" tabindex="-1" aria-labelledby="hospitalModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="hospitalModalLabel"><i class="fas fa-plus-circle me-2"></i>Register New Hospital</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="hospitalForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Hospital Name</label>
                        <input type="text" class="form-control" placeholder="Enter hospital name">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">City</label>
                            <input type="text" class="form-control" placeholder="City">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Contact No</label>
                            <input type="tel" class="form-control" placeholder="Phone">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control" placeholder="Email ID">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Address</label>
                        <textarea class="form-control" rows="2" placeholder="Full hospital address"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary px-4">Save Hospital</button>
            </div>
        </div>
    </div>
</div>
